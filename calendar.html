<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>공사 일정 캘린더</title>
<style>
:root {
  --bg:#0f172a;--surface:#1e293b;--surface2:#273549;--border:#334155;
  --accent:#14b8a6;--accent-dk:#0d9488;--text:#f1f5f9;--muted:#64748b;
  --danger:#f87171;--success:#4ade80;--r:12px;--rs:8px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,'Malgun Gothic',sans-serif;background:var(--bg);color:var(--text);min-height:100dvh;display:flex;flex-direction:column}
.app{display:flex;flex:1;overflow:hidden;height:100dvh}
.sidebar{width:260px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}

/* Sidebar */
.sidebar-header{padding:20px 16px 12px;border-bottom:1px solid var(--border)}
.sidebar-title{font-size:16px;font-weight:700;margin-bottom:4px}
.sidebar-sub{font-size:11px;color:var(--muted)}
.sidebar-body{padding:12px;flex:1;overflow-y:auto}
.mini-cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.mini-cal-title{font-size:13px;font-weight:600}
.mini-nav{background:none;border:none;color:var(--muted);cursor:pointer;padding:4px 6px;border-radius:4px;font-size:14px}
.mini-nav:hover{background:var(--surface2);color:var(--text)}
.mini-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;text-align:center}
.mini-dow{font-size:10px;color:var(--muted);padding:2px 0;font-weight:600}
.mini-day{font-size:11px;padding:4px 2px;border-radius:50%;cursor:pointer;aspect-ratio:1;display:flex;align-items:center;justify-content:center}
.mini-day:hover{background:var(--surface2)}
.mini-day.today{background:var(--accent);color:#fff;font-weight:700}
.mini-day.other-month{color:var(--muted)}
.mini-day.has-event::after{content:'';display:block;width:4px;height:4px;border-radius:50%;background:var(--accent);margin:1px auto 0}
.section-label{font-size:10px;font-weight:700;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;margin:12px 0 6px;padding:0 4px}
.btn-add-event{width:100%;padding:10px;background:var(--accent);color:#fff;border:none;border-radius:var(--rs);font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;transition:background .15s}
.btn-add-event:hover{background:var(--accent-dk)}
.import-box{background:var(--surface2);border:1px solid var(--border);border-radius:var(--rs);padding:10px;margin-bottom:12px}
.import-row{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.import-name{flex:1;font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.btn-sm{padding:5px 10px;border:none;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;white-space:nowrap}
.btn-teal{background:var(--accent);color:#fff}.btn-teal:hover{background:var(--accent-dk)}
.btn-gray{background:var(--surface2);color:var(--text);border:1px solid var(--border)}.btn-gray:hover{background:var(--border)}
.btn-red{background:#dc2626;color:#fff}.btn-red:hover{background:#b91c1c}
.auth-bar{padding:10px 12px;border-top:1px solid var(--border);margin-top:auto}
.auth-row{display:flex;align-items:center;gap:8px}
.auth-dot{width:8px;height:8px;border-radius:50%;background:var(--danger);flex-shrink:0}
.auth-dot.on{background:var(--success)}
.auth-label{font-size:11px;color:var(--muted);flex:1}
.btn-auth{padding:5px 10px;border:none;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;background:var(--accent);color:#fff}

/* Topbar */
.topbar{display:flex;align-items:center;gap:12px;padding:12px 20px;border-bottom:1px solid var(--border);flex-shrink:0}
.nav-group{display:flex;align-items:center;gap:6px}
.btn-nav{background:none;border:1px solid var(--border);color:var(--text);padding:5px 10px;border-radius:6px;cursor:pointer;font-size:13px;font-family:inherit}
.btn-nav:hover{background:var(--surface2)}
.cal-title{font-size:18px;font-weight:700;min-width:140px}
.view-tabs{display:flex;gap:2px;background:var(--surface);border:1px solid var(--border);border-radius:var(--rs);padding:3px;margin-left:auto}
.view-tab{padding:5px 14px;border:none;border-radius:6px;background:none;color:var(--muted);font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s}
.view-tab.active{background:var(--accent);color:#fff}

/* Calendar grid - 너비 고정 핵심 */
.cal-body{flex:1;overflow:auto;padding:0}
.cal-grid{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));border-left:1px solid var(--border);border-top:1px solid var(--border);width:100%;table-layout:fixed}
.cal-dow{background:var(--surface);padding:8px;text-align:center;font-size:11px;font-weight:700;color:var(--muted);border-right:1px solid var(--border);border-bottom:1px solid var(--border);text-transform:uppercase;letter-spacing:.05em}
.cal-cell{border-right:1px solid var(--border);border-bottom:1px solid var(--border);min-height:110px;padding:6px;cursor:pointer;transition:background .1s;position:relative;overflow:hidden;min-width:0}
.cal-cell:hover{background:rgba(255,255,255,.03)}
.cal-cell.today{background:rgba(20,184,166,.07)}
.cal-cell.other-month .day-num{color:var(--muted)}
.day-num{font-size:12px;font-weight:600;margin-bottom:4px;display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:50%;flex-shrink:0}
.cal-cell.today .day-num{background:var(--accent);color:#fff}
.cal-event{font-size:11px;font-weight:500;padding:2px 6px;border-radius:4px;margin-bottom:2px;cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%;display:block}
.cal-event:hover{opacity:.8}
.more-events{font-size:10px;color:var(--muted);padding:1px 4px}

/* Week/Day view */
.week-grid{display:grid;grid-template-columns:50px repeat(7,minmax(0,1fr));border-left:1px solid var(--border);border-top:1px solid var(--border)}
.week-header-cell{background:var(--surface);padding:8px 4px;text-align:center;border-right:1px solid var(--border);border-bottom:1px solid var(--border)}
.week-dow{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase}
.week-date{font-size:18px;font-weight:700;width:32px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:50%;margin:2px auto 0}
.week-date.today{background:var(--accent);color:#fff}
.time-col{font-size:10px;color:var(--muted);padding:2px 4px 0;text-align:right;border-right:1px solid var(--border);border-bottom:1px solid var(--border);height:48px;display:flex;align-items:flex-start}
.week-cell{border-right:1px solid var(--border);border-bottom:1px solid var(--border);height:48px;position:relative;cursor:pointer;overflow:hidden;min-width:0}
.week-cell:hover{background:rgba(255,255,255,.03)}
.week-event{position:absolute;left:2px;right:2px;border-radius:4px;font-size:10px;font-weight:600;padding:2px 4px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;cursor:pointer;z-index:1}
.day-grid{display:grid;grid-template-columns:50px 1fr;border-left:1px solid var(--border);border-top:1px solid var(--border)}

/* Event colors */
.ev-1{background:#d50000cc;color:#fff}.ev-2{background:#e67c73cc;color:#fff}
.ev-3{background:#f4511ecc;color:#fff}.ev-4{background:#f6bf26cc;color:#1e293b}
.ev-5{background:#33b679cc;color:#fff}.ev-6{background:#039be5cc;color:#fff}
.ev-7{background:#3f51b5cc;color:#fff}.ev-8{background:#7986cbcc;color:#fff}
.ev-9{background:#8d24aacc;color:#fff}.ev-10{background:#616161cc;color:#fff}
.ev-11{background:#0b8043cc;color:#fff}.ev-default{background:#14b8a6cc;color:#fff}

/* Modal */
.overlay{display:none;position:fixed;inset:0;background:#000a;z-index:200;align-items:center;justify-content:center}
.overlay.open{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:24px;width:500px;max-width:95vw;max-height:90dvh;overflow-y:auto}
.modal-title{font-size:16px;font-weight:700;margin-bottom:20px;display:flex;align-items:center;justify-content:space-between}
.modal-close{background:none;border:none;color:var(--muted);cursor:pointer;font-size:20px;padding:0 4px;line-height:1}
.modal-close:hover{color:var(--text)}
.field{margin-bottom:14px}
.label{display:block;font-size:12px;font-weight:600;color:var(--muted);margin-bottom:6px}
.input,.select-input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:var(--rs);color:var(--text);font-size:13px;padding:9px 12px;font-family:inherit;outline:none;transition:border .15s}
.input:focus,.select-input:focus{border-color:var(--accent)}
.select-input{cursor:pointer}
.toggle-row{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.toggle{position:relative;width:36px;height:20px;flex-shrink:0}
.toggle input{opacity:0;width:0;height:0;position:absolute}
.toggle-track{position:absolute;inset:0;background:var(--border);border-radius:99px;cursor:pointer;transition:background .2s}
.toggle input:checked+.toggle-track{background:var(--accent)}
.toggle-thumb{position:absolute;top:2px;left:2px;width:16px;height:16px;background:#fff;border-radius:50%;transition:transform .2s;pointer-events:none}
.toggle input:checked~.toggle-thumb{transform:translateX(16px)}
.date-row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.repeat-tabs{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:8px}
.repeat-tab{padding:5px 12px;border:1px solid var(--border);border-radius:6px;background:none;color:var(--muted);font-size:12px;font-weight:600;cursor:pointer;font-family:inherit}
.repeat-tab.active{background:var(--accent);border-color:var(--accent);color:#fff}
.interval-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.interval-input{width:70px;background:var(--bg);border:1px solid var(--border);border-radius:var(--rs);color:var(--text);font-size:13px;padding:7px 10px;font-family:inherit;outline:none;text-align:center}
.interval-input:focus{border-color:var(--accent)}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:20px;padding-top:16px;border-top:1px solid var(--border)}
.btn{padding:8px 20px;border:none;border-radius:var(--rs);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:background .15s}
.btn-primary{background:var(--accent);color:#fff}.btn-primary:hover{background:var(--accent-dk)}
.btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--border)}.btn-ghost:hover{background:var(--surface2);color:var(--text)}
.btn-danger{background:#dc2626;color:#fff}.btn-danger:hover{background:#b91c1c}

/* Import modal */
.import-list{max-height:350px;overflow-y:auto;margin:0 -24px;padding:0 24px}
.import-item{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)}
.import-item:last-child{border-bottom:none}
.import-item-info{flex:1;min-width:0}
.import-item-name{font-size:13px;font-weight:600;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.import-item-dates{display:flex;gap:6px;flex-wrap:wrap}
.date-chk-label{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--muted);cursor:pointer;padding:2px 8px;border:1px solid var(--border);border-radius:99px;transition:all .15s}
.date-chk-label:hover{border-color:var(--accent);color:var(--text)}
.date-chk-label input:checked+span{color:var(--accent);font-weight:700}
.date-chk-label:has(input:checked){border-color:var(--accent);background:rgba(20,184,166,.1)}
.date-chk-label input{width:12px;height:12px;accent-color:var(--accent)}
.import-select-all{display:flex;gap:8px;margin-bottom:12px;padding-bottom:12px;border-bottom:1px solid var(--border)}

/* Config modal */
.cfg-input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:var(--rs);color:var(--text);font-size:13px;padding:9px 12px;font-family:monospace;outline:none}
.cfg-input:focus{border-color:var(--accent)}
.cfg-hint{font-size:11px;color:var(--muted);margin-top:5px;line-height:1.5}

/* Toast */
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--surface);border:1px solid var(--border);border-radius:var(--rs);padding:10px 20px;font-size:13px;color:var(--text);box-shadow:0 8px 32px #0008;transition:transform .25s ease;z-index:999;white-space:nowrap}
#toast.show{transform:translateX(-50%) translateY(0)}
#toast.ok{border-color:var(--success);color:var(--success)}
#toast.err{border-color:var(--danger);color:var(--danger)}
input[type="file"]{display:none}
</style>
</head>
<body>
<div class="app">

<!-- Sidebar -->
<div class="sidebar">
  <div class="sidebar-header">
    <div class="sidebar-title">📅 공사 일정</div>
    <div class="sidebar-sub">Google Calendar 연동</div>
  </div>
  <div class="sidebar-body">
    <button class="btn-add-event" id="btn-new-event">+ 일정 추가</button>
    <div class="mini-cal" style="margin-top:16px">
      <div class="mini-cal-header">
        <button class="mini-nav" id="mini-prev">‹</button>
        <span class="mini-cal-title" id="mini-title"></span>
        <button class="mini-nav" id="mini-next">›</button>
      </div>
      <div class="mini-grid" id="mini-grid"></div>
    </div>
    <div class="section-label">공사대장 가져오기</div>
    <div class="import-box">
      <div class="import-name" id="import-name">파일 선택...</div>
      <div class="import-row" style="margin-top:6px">
        <button class="btn-sm btn-teal" id="btn-import">📂 선택</button>
        <button class="btn-sm btn-gray" id="btn-import-clear" style="display:none">✕</button>
        <button class="btn-sm btn-teal" id="btn-import-register" style="display:none;margin-left:auto">Calendar 등록</button>
      </div>
    </div>
    <input type="file" id="file-input" accept=".xlsx,.xls,.xlsm">
    <div class="section-label">설정</div>
    <button class="btn-sm btn-gray" style="width:100%" id="btn-cfg">⚙ API 설정</button>
  </div>
  <div class="auth-bar">
    <div class="auth-row">
      <div class="auth-dot" id="auth-dot"></div>
      <span class="auth-label" id="auth-label">연결 안 됨</span>
      <button class="btn-auth" id="btn-auth">로그인</button>
    </div>
  </div>
</div>

<!-- Main -->
<div class="main">
  <div class="topbar">
    <div class="nav-group">
      <button class="btn-nav" id="btn-today">오늘</button>
      <button class="btn-nav" id="btn-prev">‹</button>
      <button class="btn-nav" id="btn-next">›</button>
    </div>
    <span class="cal-title" id="cal-title"></span>
    <div class="view-tabs">
      <button class="view-tab active" data-view="month">월</button>
      <button class="view-tab" data-view="week">주</button>
      <button class="view-tab" data-view="day">일</button>
    </div>
  </div>
  <div class="cal-body" id="cal-body"></div>
</div>
</div>

<!-- 일정 추가/수정 Modal -->
<div class="overlay" id="ev-modal">
  <div class="modal">
    <div class="modal-title">
      <span id="ev-modal-title">일정 추가</span>
      <button class="modal-close" id="ev-modal-close">✕</button>
    </div>
    <!-- 공사명 선택 -->
    <div class="field" id="field-gongsa" style="display:none">
      <label class="label">공사명에서 선택 (선택사항)</label>
      <select class="select-input" id="ev-gongsa-select">
        <option value="">— 직접 입력 —</option>
      </select>
    </div>
    <div class="field">
      <label class="label">일정 제목 <span style="color:var(--danger)">*</span></label>
      <input type="text" class="input" id="ev-title" placeholder="일정 제목">
    </div>
    <div class="toggle-row">
      <label class="toggle">
        <input type="checkbox" id="ev-allday" checked>
        <div class="toggle-track"></div>
        <div class="toggle-thumb"></div>
      </label>
      <span style="font-size:13px">종일</span>
    </div>
    <div class="field">
      <label class="label">시작</label>
      <div class="date-row">
        <input type="date" class="input" id="ev-start-date">
        <input type="time" class="input" id="ev-start-time" value="09:00" style="display:none">
      </div>
    </div>
    <div class="field">
      <label class="label">종료</label>
      <div class="date-row">
        <input type="date" class="input" id="ev-end-date">
        <input type="time" class="input" id="ev-end-time" value="10:00" style="display:none">
      </div>
    </div>
    <div class="field">
      <label class="label">반복</label>
      <div class="repeat-tabs" id="repeat-tabs">
        <button class="repeat-tab active" data-r="none">없음</button>
        <button class="repeat-tab" data-r="daily">매일</button>
        <button class="repeat-tab" data-r="weekly">매주</button>
        <button class="repeat-tab" data-r="monthly">매월</button>
        <button class="repeat-tab" data-r="custom">직접설정</button>
      </div>
      <div id="repeat-custom-wrap" style="display:none;margin-bottom:8px">
        <div class="interval-row">
          <span style="font-size:13px">매</span>
          <input type="number" class="interval-input" id="ev-interval" value="1" min="1" max="365">
          <select class="select-input" id="ev-interval-unit" style="width:80px">
            <option value="DAILY">일</option>
            <option value="WEEKLY">주</option>
            <option value="MONTHLY">월</option>
          </select>
          <span style="font-size:13px">마다</span>
        </div>
      </div>
      <div id="repeat-end-wrap" style="display:none">
        <label class="label">반복 종료일</label>
        <input type="date" class="input" id="ev-repeat-end">
        <div style="font-size:11px;color:var(--muted);margin-top:4px">종료일까지 반복됩니다.</div>
      </div>
    </div>
    <div class="field">
      <label class="label">장소</label>
      <input type="text" class="input" id="ev-location" placeholder="장소 (선택)">
    </div>
    <div class="field">
      <label class="label">색상</label>
      <select class="select-input" id="ev-color">
        <option value="6">청록</option>
        <option value="1">빨강</option>
        <option value="2">분홍</option>
        <option value="3">주황</option>
        <option value="4">노랑</option>
        <option value="5">초록</option>
        <option value="7">파랑</option>
        <option value="8">라벤더</option>
        <option value="9">자주</option>
        <option value="10">회색</option>
      </select>
    </div>
    <div class="modal-actions">
      <button class="btn btn-danger" id="ev-delete-btn" style="display:none;margin-right:auto">삭제</button>
      <button class="btn btn-ghost" id="ev-cancel">취소</button>
      <button class="btn btn-primary" id="ev-save">저장</button>
    </div>
  </div>
</div>

<!-- 공사대장 등록 Modal -->
<div class="overlay" id="import-modal">
  <div class="modal" style="width:560px">
    <div class="modal-title">
      📊 공사대장 일정 등록
      <button class="modal-close" onclick="closeImportModal()">✕</button>
    </div>
    <div class="import-select-all">
      <button class="btn-sm btn-teal" onclick="importSelectAll(true)">전체 선택</button>
      <button class="btn-sm btn-gray" onclick="importSelectAll(false)">전체 해제</button>
      <span style="font-size:11px;color:var(--muted);margin-left:auto" id="import-sel-count"></span>
    </div>
    <div class="import-list" id="import-list"></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeImportModal()">취소</button>
      <button class="btn btn-primary" id="import-do-btn">선택 항목 등록</button>
    </div>
  </div>
</div>

<!-- Config Modal -->
<div class="overlay" id="cfg-modal">
  <div class="modal">
    <div class="modal-title">⚙ Google API 설정<button class="modal-close" onclick="closeCfg()">✕</button></div>
    <div class="field">
      <label class="label">Client ID</label>
      <input type="text" class="cfg-input" id="cfg-client-id" placeholder="xxxxxx.apps.googleusercontent.com">
      <div class="cfg-hint">Google Cloud Console → OAuth 2.0 클라이언트 ID<br>승인된 JavaScript 출처: <code>http://localhost:8761</code></div>
    </div>
    <div class="field">
      <label class="label">Calendar ID</label>
      <input type="text" class="cfg-input" id="cfg-cal-id" placeholder="primary">
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeCfg()">취소</button>
      <button class="btn btn-primary" id="cfg-save">저장</button>
    </div>
  </div>
</div>

<div id="toast"></div>
<script src="xlsx.mini.min.js"></script>
<script>
// ── Config ────────────────────────────────────────────────────────────────────
const CFG_KEY='gongsa_cal_cfg';
let cfg={clientId:'',calendarId:'primary'};
function loadCfg(){
  try{
    const old=JSON.parse(localStorage.getItem('cal_config_v1')||'{}');
    const cur=JSON.parse(localStorage.getItem(CFG_KEY)||'{}');
    Object.assign(cfg,old,cur);
    if(old.clientId&&!cur.clientId) saveCfg();
  }catch{}
}
function saveCfg(){localStorage.setItem(CFG_KEY,JSON.stringify(cfg));}
loadCfg();

// ── State ─────────────────────────────────────────────────────────────────────
let today=new Date();
let viewDate=new Date(today);
let view='month';
let events=[];
let parsedRows=[];
let editingEventId=null;
let gapiReady=false,gisReady=false,tokenClient=null,accessToken=null;
let repeatMode='none';

const COLOR={
  '1':{cls:'ev-1'},'2':{cls:'ev-2'},'3':{cls:'ev-3'},'4':{cls:'ev-4'},
  '5':{cls:'ev-5'},'6':{cls:'ev-6'},'7':{cls:'ev-7'},'8':{cls:'ev-8'},
  '9':{cls:'ev-9'},'10':{cls:'ev-10'},'11':{cls:'ev-11'},
};
function evCls(c){return(COLOR[c]||{cls:'ev-default'}).cls;}

// ── Toast ─────────────────────────────────────────────────────────────────────
let tt;
function toast(msg,type=''){
  const el=document.getElementById('toast');
  el.textContent=msg;el.className='show '+(type==='ok'?'ok':type==='err'?'err':'');
  clearTimeout(tt);tt=setTimeout(()=>el.className='',3000);
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function pad(n){return String(n).padStart(2,'0');}
function ymd(d){return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());}
function addDays(d,n){const r=new Date(d);r.setDate(r.getDate()+n);return r;}
function startOfWeek(d){const r=new Date(d);r.setDate(r.getDate()-r.getDay());return r;}
function sameDay(a,b){return ymd(a)===ymd(b);}
function fmtYM(d){return d.getFullYear()+'년 '+(d.getMonth()+1)+'월';}
function xlDateToISO(v){
  if(!v||typeof v!=='number')return null;
  const d=new Date((v-25569)*86400*1000);
  return d.getUTCFullYear()+'-'+pad(d.getUTCMonth()+1)+'-'+pad(d.getUTCDate());
}
function evOnDay(ev,dateStr){
  const s=ev.start?.date||ev.start?.dateTime?.split('T')[0];
  const e=ev.end?.date||ev.end?.dateTime?.split('T')[0];
  if(!s)return false;
  if(!e||e===s)return s===dateStr;
  return s<=dateStr&&dateStr<e;
}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

// ── Calendar render ───────────────────────────────────────────────────────────
function renderCal(){
  if(view==='month')renderMonth();
  else if(view==='week')renderWeek();
  else renderDay();
  renderMini(viewDate);
}

function renderMonth(){
  document.getElementById('cal-title').textContent=fmtYM(viewDate);
  const first=new Date(viewDate.getFullYear(),viewDate.getMonth(),1);
  let cur=addDays(first,-first.getDay());
  const DOWS=['일','월','화','수','목','금','토'];
  let html='<div class="cal-grid">';
  DOWS.forEach(w=>{html+=`<div class="cal-dow">${w}</div>`;});
  for(let w=0;w<6;w++){
    for(let d=0;d<7;d++){
      const isTod=sameDay(cur,today);
      const isCur=cur.getMonth()===viewDate.getMonth();
      const ds=ymd(cur);
      const dayEvs=events.filter(ev=>evOnDay(ev,ds));
      const shown=dayEvs.slice(0,3);const more=dayEvs.length-3;
      html+=`<div class="cal-cell${isTod?' today':''}${!isCur?' other-month':''}" onclick="clickDay('${ds}')">`;
      html+=`<div class="day-num">${cur.getDate()}</div>`;
      shown.forEach(ev=>{
        html+=`<div class="cal-event ${evCls(ev.colorId)}" onclick="clickEvent(event,'${ev.id}')" title="${esc(ev.summary||'')}">${esc(ev.summary||'(제목없음)')}</div>`;
      });
      if(more>0)html+=`<div class="more-events">+${more}개</div>`;
      html+='</div>';
      cur=addDays(cur,1);
    }
  }
  html+='</div>';
  document.getElementById('cal-body').innerHTML=html;
}

function renderWeek(){
  const sun=startOfWeek(viewDate);
  const sunEnd=addDays(sun,6);
  document.getElementById('cal-title').textContent=
    fmtYM(sun)+' '+sun.getDate()+'일 – '+sunEnd.getDate()+'일';
  const DOWS=['일','월','화','수','목','금','토'];
  let html='<div class="week-grid" style="min-width:500px">';
  html+='<div class="week-header-cell" style="border-right:1px solid var(--border);border-bottom:1px solid var(--border)"></div>';
  for(let i=0;i<7;i++){
    const day=addDays(sun,i);
    const isTod=sameDay(day,today);
    html+=`<div class="week-header-cell"><div class="week-dow">${DOWS[i]}</div><div class="week-date${isTod?' today':''}">${day.getDate()}</div></div>`;
  }
  for(let h=0;h<24;h++){
    html+=`<div class="time-col">${h>0?h+':00':''}</div>`;
    for(let i=0;i<7;i++){
      const ds=ymd(addDays(sun,i));
      const hEvs=events.filter(ev=>evOnDay(ev,ds)&&(ev.start?.dateTime?parseInt(ev.start.dateTime.split('T')[1]||'0')===h:h===0));
      html+=`<div class="week-cell" onclick="clickDay('${ds}T${pad(h)}:00')">`;
      hEvs.forEach(ev=>{html+=`<div class="week-event ${evCls(ev.colorId)}" onclick="clickEvent(event,'${ev.id}')">${esc(ev.summary||'')}</div>`;});
      html+='</div>';
    }
  }
  html+='</div>';
  document.getElementById('cal-body').innerHTML=html;
}

function renderDay(){
  const ds=ymd(viewDate);
  document.getElementById('cal-title').textContent=viewDate.getFullYear()+'년 '+(viewDate.getMonth()+1)+'월 '+viewDate.getDate()+'일';
  const dayEvs=events.filter(ev=>evOnDay(ev,ds));
  let html='<div class="day-grid">';
  for(let h=0;h<24;h++){
    html+=`<div class="time-col">${h>0?h+':00':''}</div>`;
    const hEvs=dayEvs.filter(ev=>ev.start?.dateTime?parseInt(ev.start.dateTime.split('T')[1]||'0')===h:h===0);
    html+=`<div class="week-cell" style="border-right:none" onclick="clickDay('${ds}T${pad(h)}:00')">`;
    hEvs.forEach(ev=>{html+=`<div class="week-event ${evCls(ev.colorId)}" onclick="clickEvent(event,'${ev.id}')">${esc(ev.summary||'')}</div>`;});
    html+='</div>';
  }
  html+='</div>';
  document.getElementById('cal-body').innerHTML=html;
}

function renderMini(d){
  document.getElementById('mini-title').textContent=fmtYM(d);
  const first=new Date(d.getFullYear(),d.getMonth(),1);
  let cur=addDays(first,-first.getDay());
  const DOWS=['일','월','화','수','목','금','토'];
  let html=DOWS.map(w=>`<div class="mini-dow">${w}</div>`).join('');
  for(let i=0;i<42;i++){
    const isTod=sameDay(cur,today);
    const isCur=cur.getMonth()===d.getMonth();
    const ds=ymd(cur);
    const hasEv=events.some(ev=>evOnDay(ev,ds));
    html+=`<div class="mini-day${isTod?' today':''}${!isCur?' other-month':''}${hasEv?' has-event':''}" onclick="gotoDay('${ds}')">${cur.getDate()}</div>`;
    cur=addDays(cur,1);
  }
  document.getElementById('mini-grid').innerHTML=html;
}

// Navigation
document.getElementById('btn-today').onclick=()=>{viewDate=new Date(today);renderCal();};
document.getElementById('btn-prev').onclick=()=>nav(-1);
document.getElementById('btn-next').onclick=()=>nav(1);
document.getElementById('mini-prev').onclick=()=>{viewDate=new Date(viewDate.getFullYear(),viewDate.getMonth()-1,1);renderCal();};
document.getElementById('mini-next').onclick=()=>{viewDate=new Date(viewDate.getFullYear(),viewDate.getMonth()+1,1);renderCal();};
function nav(dir){
  if(view==='month')viewDate=new Date(viewDate.getFullYear(),viewDate.getMonth()+dir,1);
  else if(view==='week')viewDate=addDays(viewDate,dir*7);
  else viewDate=addDays(viewDate,dir);
  renderCal();
}
document.querySelectorAll('.view-tab').forEach(btn=>{
  btn.onclick=()=>{
    view=btn.dataset.view;
    document.querySelectorAll('.view-tab').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');renderCal();
  };
});
function gotoDay(ds){
  viewDate=new Date(ds+'T00:00:00');view='day';
  document.querySelectorAll('.view-tab').forEach(b=>b.classList.remove('active'));
  document.querySelector('[data-view="day"]').classList.add('active');renderCal();
}
function clickDay(ds){openEventModal(null,ds.split('T')[0]);}
function clickEvent(e,id){e.stopPropagation();const ev=events.find(ev=>ev.id===id);if(ev)openEventModal(ev);}

// ── Event Modal ───────────────────────────────────────────────────────────────
const evModal=document.getElementById('ev-modal');

function openEventModal(ev,defaultDate){
  editingEventId=ev?ev.id:null;
  document.getElementById('ev-modal-title').textContent=ev?'일정 수정':'일정 추가';
  document.getElementById('ev-delete-btn').style.display=ev?'':'none';

  // 공사명 드롭다운 갱신
  const gongsaSel=document.getElementById('ev-gongsa-select');
  gongsaSel.innerHTML='<option value="">— 직접 입력 —</option>';
  parsedRows.forEach((r,i)=>{
    const opt=document.createElement('option');
    opt.value=i;opt.textContent=r.title;
    gongsaSel.appendChild(opt);
  });
  document.getElementById('field-gongsa').style.display=parsedRows.length?'':'none';
  gongsaSel.value='';

  document.getElementById('ev-title').value=ev?ev.summary||'':'';
  const isAllDay=ev?!!ev.start?.date:true;
  document.getElementById('ev-allday').checked=isAllDay;
  toggleAlldayUI(isAllDay);

  const sd=ev?(ev.start?.date||ev.start?.dateTime?.split('T')[0]||''):(defaultDate||ymd(today));
  const ed=ev?(ev.end?.date||ev.end?.dateTime?.split('T')[0]||sd):sd;
  document.getElementById('ev-start-date').value=sd;
  document.getElementById('ev-end-date').value=ed;
  document.getElementById('ev-start-time').value=ev?.start?.dateTime?.split('T')[1]?.slice(0,5)||'09:00';
  document.getElementById('ev-end-time').value=ev?.end?.dateTime?.split('T')[1]?.slice(0,5)||'10:00';
  document.getElementById('ev-location').value=ev?.location||'';
  document.getElementById('ev-color').value=ev?.colorId||'6';

  // repeat reset
  repeatMode='none';
  document.querySelectorAll('.repeat-tab').forEach(b=>b.classList.remove('active'));
  document.querySelector('[data-r="none"]').classList.add('active');
  document.getElementById('repeat-end-wrap').style.display='none';
  document.getElementById('repeat-custom-wrap').style.display='none';
  document.getElementById('ev-repeat-end').value='';
  document.getElementById('ev-interval').value='1';
  document.getElementById('ev-interval-unit').value='DAILY';

  evModal.classList.add('open');
  setTimeout(()=>document.getElementById('ev-title').focus(),50);
}

function closeEventModal(){evModal.classList.remove('open');}
document.getElementById('ev-modal-close').onclick=closeEventModal;
document.getElementById('ev-cancel').onclick=closeEventModal;
evModal.addEventListener('click',e=>{if(e.target===evModal)closeEventModal();});

document.getElementById('ev-allday').addEventListener('change',e=>toggleAlldayUI(e.target.checked));
function toggleAlldayUI(allDay){
  document.getElementById('ev-start-time').style.display=allDay?'none':'';
  document.getElementById('ev-end-time').style.display=allDay?'none':'';
}

// 공사명 선택 시 날짜 자동 채움
document.getElementById('ev-gongsa-select').addEventListener('change',function(){
  const idx=this.value;
  if(idx==='')return;
  const row=parsedRows[parseInt(idx)];
  if(!row)return;
  document.getElementById('ev-title').value=row.title;
  if(row.startDate)document.getElementById('ev-start-date').value=row.startDate;
  if(row.endDate)document.getElementById('ev-end-date').value=row.endDate;
  else if(row.startDate)document.getElementById('ev-end-date').value=row.startDate;
});

// Repeat tabs
document.querySelectorAll('.repeat-tab').forEach(btn=>{
  btn.onclick=()=>{
    repeatMode=btn.dataset.r;
    document.querySelectorAll('.repeat-tab').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('repeat-end-wrap').style.display=repeatMode!=='none'?'':'none';
    document.getElementById('repeat-custom-wrap').style.display=repeatMode==='custom'?'':'none';
  };
});

document.getElementById('btn-new-event').onclick=()=>openEventModal(null);

// Save
document.getElementById('ev-save').onclick=async()=>{
  if(!accessToken){toast('먼저 Google 로그인 해주세요','err');return;}
  const title=document.getElementById('ev-title').value.trim();
  if(!title){toast('제목을 입력하세요','err');return;}
  const allDay=document.getElementById('ev-allday').checked;
  const sDate=document.getElementById('ev-start-date').value;
  const eDate=document.getElementById('ev-end-date').value||sDate;
  const sTime=document.getElementById('ev-start-time').value||'09:00';
  const eTime=document.getElementById('ev-end-time').value||'10:00';
  const loc=document.getElementById('ev-location').value.trim();
  const colorId=document.getElementById('ev-color').value;
  const repeatEnd=document.getElementById('ev-repeat-end').value;

  const resource={summary:title,colorId,location:loc||undefined};
  if(allDay){
    const endD=new Date(eDate+'T00:00:00');endD.setDate(endD.getDate()+1);
    resource.start={date:sDate};resource.end={date:ymd(endD)};
  } else {
    const tz=Intl.DateTimeFormat().resolvedOptions().timeZone;
    resource.start={dateTime:sDate+'T'+sTime+':00',timeZone:tz};
    resource.end={dateTime:eDate+'T'+eTime+':00',timeZone:tz};
  }
  // Recurrence
  if(repeatMode!=='none'&&repeatEnd){
    let freq,interval=1;
    if(repeatMode==='custom'){
      freq=document.getElementById('ev-interval-unit').value;
      interval=parseInt(document.getElementById('ev-interval').value)||1;
    } else {
      freq={daily:'DAILY',weekly:'WEEKLY',monthly:'MONTHLY'}[repeatMode];
    }
    // 종일 이벤트는 UNTIL에 날짜만, 시간 이벤트는 UTC datetime
    const until=allDay
      ? repeatEnd.replace(/-/g,'')
      : repeatEnd.replace(/-/g,'')+'T235959Z';
    resource.recurrence=[`RRULE:FREQ=${freq};INTERVAL=${interval};UNTIL=${until}`];
  }

  try{
    if(editingEventId){
      await gapi.client.calendar.events.patch({calendarId:cfg.calendarId||'primary',eventId:editingEventId,resource});
      toast('수정됨','ok');
    } else {
      await gapi.client.calendar.events.insert({calendarId:cfg.calendarId||'primary',resource});
      toast('등록됨','ok');
    }
    closeEventModal();await fetchEvents();
  }catch(e){toast('오류: '+(e.result?.error?.message||e.message),'err');}
};

document.getElementById('ev-delete-btn').onclick=async()=>{
  if(!editingEventId||!confirm('삭제할까요?'))return;
  try{
    await gapi.client.calendar.events.delete({calendarId:cfg.calendarId||'primary',eventId:editingEventId});
    closeEventModal();await fetchEvents();toast('삭제됨','ok');
  }catch{toast('삭제 실패','err');}
};

// ── Import Modal ──────────────────────────────────────────────────────────────
function openImportModal(){
  if(!parsedRows.length){toast('먼저 파일을 선택하세요','err');return;}
  const list=document.getElementById('import-list');
  list.innerHTML=parsedRows.map((row,i)=>{
    const dates=[
      row.contractDate?`<label class="date-chk-label"><input type="checkbox" class="imp-chk" data-idx="${i}" data-date="${row.contractDate}" data-type="계약" checked><span>계약 ${row.contractDate}</span></label>`:'',
      row.startDate?`<label class="date-chk-label"><input type="checkbox" class="imp-chk" data-idx="${i}" data-date="${row.startDate}" data-type="착공" checked><span>착공 ${row.startDate}</span></label>`:'',
      row.endDate?`<label class="date-chk-label"><input type="checkbox" class="imp-chk" data-idx="${i}" data-date="${row.endDate}" data-type="준공" checked><span>준공 ${row.endDate}</span></label>`:'',
    ].filter(Boolean).join('');
    if(!dates)return'';
    return`<div class="import-item">
      <input type="checkbox" class="imp-row-chk" data-idx="${i}" checked style="margin-top:3px;accent-color:var(--accent)">
      <div class="import-item-info">
        <div class="import-item-name" title="${esc(row.title)}">${esc(row.title)}</div>
        <div class="import-item-dates">${dates}</div>
      </div>
    </div>`;
  }).join('');
  updateImportCount();
  document.querySelectorAll('.imp-row-chk').forEach(chk=>{
    chk.addEventListener('change',function(){
      const idx=this.dataset.idx;
      document.querySelectorAll(`.imp-chk[data-idx="${idx}"]`).forEach(c=>c.checked=this.checked);
      updateImportCount();
    });
  });
  document.querySelectorAll('.imp-chk').forEach(c=>c.addEventListener('change',updateImportCount));
  document.getElementById('import-modal').classList.add('open');
}
function closeImportModal(){document.getElementById('import-modal').classList.remove('open');}
document.getElementById('import-modal').addEventListener('click',e=>{if(e.target.id==='import-modal')closeImportModal();});
function updateImportCount(){
  const total=document.querySelectorAll('.imp-chk:checked').length;
  document.getElementById('import-sel-count').textContent=`${total}개 선택됨`;
}
function importSelectAll(v){
  document.querySelectorAll('.imp-chk,.imp-row-chk').forEach(c=>c.checked=v);
  updateImportCount();
}

document.getElementById('import-do-btn').onclick=async()=>{
  if(!accessToken){toast('먼저 Google 로그인 해주세요','err');return;}
  const chks=[...document.querySelectorAll('.imp-chk:checked')];
  if(!chks.length){toast('선택된 항목이 없습니다','err');return;}
  const btn=document.getElementById('import-do-btn');
  btn.disabled=true;btn.textContent='등록 중...';
  const calId=cfg.calendarId||'primary';
  let ok=0;
  for(const chk of chks){
    const i=parseInt(chk.dataset.idx);
    const date=chk.dataset.date;
    const type=chk.dataset.type;
    const title=`[${type}] ${parsedRows[i].title}`;
    try{
      const endD=new Date(date+'T00:00:00');endD.setDate(endD.getDate()+1);
      await gapi.client.calendar.events.insert({calendarId:calId,resource:{
        summary:title,colorId:'6',
        start:{date},end:{date:ymd(endD)},
        description:'공사대장 자동 등록'
      }});
      ok++;
    }catch{}
  }
  await fetchEvents();
  btn.disabled=false;btn.textContent='선택 항목 등록';
  closeImportModal();
  toast(`${ok}건 등록 완료`,'ok');
};

// ── Google API ────────────────────────────────────────────────────────────────
function loadGapi(){
  if(document.getElementById('_gapi'))return;
  const s=document.createElement('script');s.id='_gapi';
  s.src='https://apis.google.com/js/api.js';
  s.onload=()=>{gapi.load('client',async()=>{
    await gapi.client.init({discoveryDocs:['https://www.googleapis.com/discovery/v1/apis/calendar/v3/rest']});
    gapiReady=true;
  });};
  document.head.appendChild(s);
}
function loadGis(){
  if(document.getElementById('_gis'))return;
  const s=document.createElement('script');s.id='_gis';
  s.src='https://accounts.google.com/gsi/client';
  s.onload=()=>{gisReady=true;initTC();};
  document.head.appendChild(s);
}
function initTC(){
  if(!cfg.clientId)return;
  tokenClient=google.accounts.oauth2.initTokenClient({
    client_id:cfg.clientId,
    scope:'https://www.googleapis.com/auth/calendar',
    callback:(resp)=>{
      if(resp.error){toast('로그인 실패','err');return;}
      accessToken=resp.access_token;
      gapi.client.setToken({access_token:accessToken});
      setAuthUI(true);fetchEvents();
    }
  });
}
document.getElementById('btn-auth').onclick=()=>{
  if(accessToken){
    google.accounts.oauth2.revoke(accessToken);
    accessToken=null;events=[];setAuthUI(false);renderCal();return;
  }
  loadCfg();
  if(!cfg.clientId){openCfg();return;}
  loadGapi();loadGis();waitAndLogin();
};
function waitAndLogin(attempt=0){
  if(gapiReady&&gisReady){
    if(!tokenClient)initTC();
    tokenClient.requestAccessToken({prompt:'select_account'});
    return;
  }
  if(attempt===0)toast('Google API 연결 중...');
  if(attempt>20){toast('로드 실패. 새로고침 후 다시 시도하세요','err');return;}
  setTimeout(()=>waitAndLogin(attempt+1),300);
}
function setAuthUI(on){
  document.getElementById('auth-dot').className='auth-dot'+(on?' on':'');
  document.getElementById('auth-label').textContent=on?'Google 연결됨':'연결 안 됨';
  document.getElementById('btn-auth').textContent=on?'로그아웃':'로그인';
}
async function fetchEvents(){
  if(!accessToken||!gapiReady)return;
  try{
    let all=[], pageToken=undefined;
    const calId=cfg.calendarId||'primary';
    const timeMin=new Date(2020,0,1).toISOString();
    const timeMax=new Date(2035,0,1).toISOString();
    do{
      const resp=await gapi.client.calendar.events.list({
        calendarId:calId, maxResults:2500, singleEvents:true,
        orderBy:'startTime', timeMin, timeMax,
        ...(pageToken?{pageToken}:{})
      });
      all=all.concat(resp.result.items||[]);
      pageToken=resp.result.nextPageToken;
    }while(pageToken);
    events=all;renderCal();
  }catch(e){toast('이벤트 불러오기 실패','err');}
}

// ── Excel Import ──────────────────────────────────────────────────────────────
document.getElementById('btn-import').onclick=()=>document.getElementById('file-input').click();
document.getElementById('btn-import-clear').onclick=()=>{
  parsedRows=[];
  localStorage.removeItem('gongsa_rows');
  document.getElementById('import-name').textContent='파일 선택...';
  document.getElementById('btn-import-clear').style.display='none';
  document.getElementById('btn-import-register').style.display='none';
  document.getElementById('file-input').value='';
};
document.getElementById('file-input').addEventListener('change',(e)=>{
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=(evt)=>{
    try{
      const wb=XLSX.read(new Uint8Array(evt.target.result),{type:'array'});
      const TARGET='공사현장대장';
      const sheetName=wb.SheetNames.includes(TARGET)?TARGET:wb.SheetNames[0];
      const rows=XLSX.utils.sheet_to_json(wb.Sheets[sheetName],{header:1});
      const isT=sheetName===TARGET;
      parsedRows=[];
      for(let i=isT?4:1;i<rows.length;i++){
        const r=rows[i];
        const title=r[3]?String(r[3]).trim():'';if(!title)continue;
        parsedRows.push({
          title,org:r[15]?String(r[15]).trim():'',
          contractDate:xlDateToISO(r[9]),
          startDate:xlDateToISO(r[10]),
          endDate:xlDateToISO(r[12])
        });
      }
      if(!parsedRows.length){toast('데이터 없음','err');return;}
      localStorage.setItem('gongsa_rows',JSON.stringify(parsedRows));
      document.getElementById('import-name').textContent=`${file.name} — ${parsedRows.length}건`;
      document.getElementById('btn-import-clear').style.display='';
      document.getElementById('btn-import-register').style.display='';
      toast(`${parsedRows.length}건 불러옴`,'ok');
    }catch(err){toast('파일 오류: '+err.message,'err');}
  };
  reader.readAsArrayBuffer(file);e.target.value='';
});
document.getElementById('btn-import-register').onclick=openImportModal;

// ── Config ────────────────────────────────────────────────────────────────────
function openCfg(){
  loadCfg();
  document.getElementById('cfg-client-id').value=cfg.clientId||'';
  document.getElementById('cfg-cal-id').value=cfg.calendarId||'primary';
  document.getElementById('cfg-modal').classList.add('open');
}
function closeCfg(){document.getElementById('cfg-modal').classList.remove('open');}
document.getElementById('btn-cfg').onclick=openCfg;
document.getElementById('cfg-save').onclick=()=>{
  cfg.clientId=document.getElementById('cfg-client-id').value.trim();
  cfg.calendarId=document.getElementById('cfg-cal-id').value.trim()||'primary';
  saveCfg();closeCfg();
  gisReady=false;tokenClient=null;loadGapi();loadGis();
  toast('저장됨','ok');
};
document.getElementById('cfg-modal').addEventListener('click',e=>{if(e.target.id==='cfg-modal')closeCfg();});

// ── Init ──────────────────────────────────────────────────────────────────────
loadCfg();

// 공사대장 데이터 복원
try{
  const saved=localStorage.getItem('gongsa_rows');
  if(saved){
    parsedRows=JSON.parse(saved);
    if(parsedRows.length){
      document.getElementById('import-name').textContent=`(저장된 데이터) — ${parsedRows.length}건`;
      document.getElementById('btn-import-clear').style.display='';
      document.getElementById('btn-import-register').style.display='';
    }
  }
}catch{}

if(cfg.clientId){
  loadGapi();
  loadGis();
  // 페이지 로드 시 자동 로그인 시도 (팝업 없이)
  setTimeout(()=>autoLogin(),1500);
}
renderCal();

function autoLogin(){
  if(accessToken)return;
  if(!gapiReady||!gisReady){setTimeout(()=>autoLogin(),500);return;}
  if(!tokenClient)initTC();
  // prompt:'' = 이미 동의한 경우 팝업 없이 자동 토큰 발급
  tokenClient.requestAccessToken({prompt:''});
}
</script>
