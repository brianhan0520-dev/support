<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>명함 관리</title>
<style>
  :root {
    --bg: #0f172a;
    --surface: #1e293b;
    --surface2: #273549;
    --border: #334155;
    --accent: #14b8a6;
    --accent-dk: #0d9488;
    --text: #f1f5f9;
    --muted: #64748b;
    --danger: #f87171;
    --success: #4ade80;
    --r: 12px;
    --rs: 8px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100dvh;
  }

  /* ── Header ── */
  header {
    position: sticky; top: 0; z-index: 50;
    background: rgba(15,23,42,.85);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
  }
  .logo {
    display: flex; align-items: center; gap: 10px;
    font-size: 16px; font-weight: 700; white-space: nowrap;
  }
  .logo-icon {
    width: 30px; height: 30px;
    background: var(--accent);
    border-radius: 7px;
    display: grid; place-items: center;
  }
  .search-wrap {
    flex: 1; max-width: 360px;
    position: relative;
  }
  .search-wrap svg {
    position: absolute; left: 11px; top: 50%; transform: translateY(-50%);
    color: var(--muted); pointer-events: none;
  }
  #search-input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 12px 8px 36px;
    border-radius: var(--rs);
    font-size: 14px;
    outline: none;
    transition: border-color .15s;
  }
  #search-input:focus { border-color: var(--accent); }
  #search-input::placeholder { color: var(--muted); }

  .header-right { display: flex; align-items: center; gap: 10px; }
  .auth-pill {
    display: flex; align-items: center; gap: 7px;
    padding: 6px 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 999px;
    font-size: 13px;
    color: var(--muted);
    cursor: pointer;
    transition: border-color .15s, color .15s;
    white-space: nowrap;
  }
  .auth-pill:hover { border-color: var(--accent); color: var(--text); }
  .auth-pill.connected { border-color: var(--success); color: var(--text); }
  .auth-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--muted); flex-shrink: 0; }
  .auth-pill.connected .auth-dot { background: var(--success); }

  /* ── Toolbar ── */
  .toolbar {
    padding: 16px 24px;
    display: flex; align-items: center; gap: 12px;
    border-bottom: 1px solid var(--border);
  }
  .count-label { font-size: 13px; color: var(--muted); flex: 1; }
  .count-label strong { color: var(--text); }
  .view-toggle { display: flex; gap: 4px; }
  .view-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 6px 10px;
    border-radius: var(--rs);
    cursor: pointer;
    transition: all .15s;
    display: grid; place-items: center;
  }
  .view-btn.active, .view-btn:hover { border-color: var(--accent); color: var(--accent); }
  .sort-select {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 6px 10px;
    border-radius: var(--rs);
    font-size: 13px;
    outline: none;
    cursor: pointer;
  }
  .btn-refresh {
    background: var(--accent);
    border: none;
    color: #fff;
    padding: 7px 14px;
    border-radius: var(--rs);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    display: flex; align-items: center; gap: 6px;
    transition: background .15s;
  }
  .btn-refresh:hover { background: var(--accent-dk); }
  .btn-refresh:disabled { opacity: .5; cursor: not-allowed; }

  /* ── Main content ── */
  #content {
    padding: 24px;
  }

  /* Empty / loading states */
  .state-box {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 14px;
    padding: 80px 24px;
    color: var(--muted);
    text-align: center;
  }
  .state-box svg { opacity: .3; }
  .state-box p { font-size: 15px; }
  .state-box small { font-size: 13px; opacity: .7; }

  .spinner {
    width: 36px; height: 36px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin .7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Grid view ── */
  #cards-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 16px;
  }
  #cards-grid.list-view {
    grid-template-columns: 1fr;
    max-width: 720px;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--r);
    padding: 18px 20px;
    cursor: pointer;
    transition: border-color .15s, transform .1s;
    position: relative;
    overflow: hidden;
  }
  .card:hover { border-color: var(--accent); transform: translateY(-1px); }
  .card-accent-bar {
    position: absolute; top: 0; left: 0; right: 0; height: 3px;
    background: linear-gradient(90deg, var(--accent), var(--accent-dk));
  }

  .card-avatar {
    width: 44px; height: 44px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), #6366f1);
    display: grid; place-items: center;
    font-size: 18px; font-weight: 700; color: #fff;
    margin-bottom: 12px;
    flex-shrink: 0;
  }

  #cards-grid.list-view .card {
    display: flex; align-items: center; gap: 16px;
    padding: 14px 18px;
  }
  #cards-grid.list-view .card-avatar { margin-bottom: 0; }
  #cards-grid.list-view .card-body { flex: 1; min-width: 0; }
  #cards-grid.list-view .card-meta { display: flex; gap: 20px; flex-wrap: wrap; }

  .card-name {
    font-size: 15px; font-weight: 700;
    margin-bottom: 2px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .card-org {
    font-size: 13px; color: var(--accent);
    margin-bottom: 10px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .card-fields { display: flex; flex-direction: column; gap: 5px; }
  .card-field {
    display: flex; align-items: center; gap: 7px;
    font-size: 13px; color: var(--muted);
    min-width: 0;
  }
  .card-field svg { flex-shrink: 0; }
  .card-field span { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  /* ── Detail modal ── */
  .overlay {
    position: fixed; inset: 0; z-index: 200;
    background: rgba(0,0,0,.6);
    backdrop-filter: blur(4px);
    display: none; align-items: center; justify-content: center;
    padding: 24px;
  }
  .overlay.open { display: flex; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--r);
    width: 100%; max-width: 460px;
    max-height: 90dvh;
    overflow-y: auto;
    box-shadow: 0 24px 64px rgba(0,0,0,.5);
  }
  .modal-header {
    padding: 20px 22px 0;
    display: flex; align-items: flex-start; gap: 14px;
  }
  .modal-avatar {
    width: 56px; height: 56px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), #6366f1);
    display: grid; place-items: center;
    font-size: 22px; font-weight: 700; color: #fff;
    flex-shrink: 0;
  }
  .modal-name-block { flex: 1; padding-top: 4px; }
  .modal-name { font-size: 20px; font-weight: 700; margin-bottom: 3px; }
  .modal-title-org { font-size: 14px; color: var(--accent); }
  .modal-close {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--muted);
    width: 32px; height: 32px;
    border-radius: var(--rs);
    cursor: pointer;
    display: grid; place-items: center;
    flex-shrink: 0;
    transition: color .15s;
  }
  .modal-close:hover { color: var(--text); }
  .modal-divider { height: 1px; background: var(--border); margin: 16px 22px; }
  .modal-fields { padding: 0 22px 22px; display: flex; flex-direction: column; gap: 14px; }
  .modal-field-row { display: flex; align-items: flex-start; gap: 12px; }
  .modal-field-icon {
    width: 34px; height: 34px;
    background: var(--surface2);
    border-radius: var(--rs);
    display: grid; place-items: center;
    flex-shrink: 0;
    color: var(--accent);
  }
  .modal-field-label { font-size: 11px; color: var(--muted); font-weight: 600; letter-spacing: .06em; text-transform: uppercase; margin-bottom: 2px; }
  .modal-field-value { font-size: 14px; }
  .modal-field-value a { color: var(--accent); text-decoration: none; }
  .modal-field-value a:hover { text-decoration: underline; }
  .modal-actions { padding: 0 22px 22px; display: flex; gap: 10px; }
  .btn-action {
    flex: 1; padding: 10px; border-radius: var(--rs);
    font-size: 13px; font-weight: 600; cursor: pointer; border: none;
    display: flex; align-items: center; justify-content: center; gap: 7px;
    transition: background .15s;
  }
  .btn-call { background: var(--success); color: #0f172a; }
  .btn-call:hover { background: #22c55e; }
  .btn-mail { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
  .btn-mail:hover { border-color: var(--accent); color: var(--accent); }
  .btn-delete { background: rgba(248,113,113,.12); color: var(--danger); border: 1px solid rgba(248,113,113,.25); }
  .btn-delete:hover { background: rgba(248,113,113,.22); }

  .btn-copy-all { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
  .btn-copy-all:hover { border-color: var(--accent); color: var(--accent); }
  .btn-copy-all.copied { border-color: var(--success); color: var(--success); }

  .copy-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--muted);
    width: 28px; height: 28px;
    border-radius: 6px;
    cursor: pointer;
    display: grid; place-items: center;
    flex-shrink: 0;
    transition: color .15s, border-color .15s;
  }
  .copy-btn:hover { color: var(--accent); border-color: var(--accent); }

  /* ── Toast ── */
  .toast {
    position: fixed; bottom: 24px; left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 11px 18px;
    border-radius: 999px;
    font-size: 14px; font-weight: 500;
    display: flex; align-items: center; gap: 8px;
    z-index: 300;
    white-space: nowrap;
    box-shadow: 0 8px 32px rgba(0,0,0,.4);
    transition: transform .3s cubic-bezier(.34,1.56,.64,1);
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.success { border-color: var(--success); }
  .toast.error   { border-color: var(--danger); }
  .toast-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); }
  .toast.success .toast-dot { background: var(--success); }
  .toast.error   .toast-dot { background: var(--danger); }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="2" y="5" width="20" height="14" rx="2"/><path d="M7 9h4M7 12h2"/>
      </svg>
    </div>
    명함 관리
  </div>

  <div class="search-wrap">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
    </svg>
    <input id="search-input" type="text" placeholder="이름, 회사, 전화번호 검색...">
  </div>

  <div class="header-right">
    <button class="auth-pill" id="auth-pill" onclick="handleAuth()">
      <span class="auth-dot"></span>
      <span id="auth-label">Google 로그인</span>
    </button>
  </div>
</header>

<div class="toolbar">
  <span class="count-label"><strong id="count-num">0</strong>개의 명함</span>

  <select class="sort-select" id="sort-select" onchange="renderCards()">
    <option value="name">이름순</option>
    <option value="company">회사순</option>
    <option value="recent">최근순</option>
  </select>

  <div class="view-toggle">
    <button class="view-btn active" id="btn-grid" onclick="setView('grid')" title="그리드">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/>
      </svg>
    </button>
    <button class="view-btn" id="btn-list" onclick="setView('list')" title="목록">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/>
      </svg>
    </button>
  </div>

  <button class="btn-refresh" id="refresh-btn" onclick="loadContacts()">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
    </svg>
    동기화
  </button>
</div>

<div id="content">
  <div class="state-box" id="state-login">
    <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
      <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
    </svg>
    <p>Google 계정에 로그인하세요</p>
    <small>Android 앱에서 저장한 명함이 Google 주소록을 통해 표시됩니다</small>
  </div>
  <div class="state-box" id="state-loading" style="display:none">
    <div class="spinner"></div>
    <p>명함 불러오는 중...</p>
  </div>
  <div class="state-box" id="state-empty" style="display:none">
    <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
      <rect x="2" y="5" width="20" height="14" rx="2"/><path d="M7 9h4M7 12h2"/>
    </svg>
    <p>저장된 명함이 없습니다</p>
    <small>Android 앱으로 명함을 스캔하면 여기에 나타납니다</small>
  </div>
  <div id="cards-grid" style="display:none"></div>
</div>

<!-- Detail Modal -->
<div class="overlay" id="overlay" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <div class="modal-header">
      <div class="modal-avatar" id="m-avatar"></div>
      <div class="modal-name-block">
        <div class="modal-name" id="m-name"></div>
        <div class="modal-title-org" id="m-title-org"></div>
      </div>
      <button class="modal-close" onclick="closeModal()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
    <div class="modal-divider"></div>
    <div class="modal-fields" id="m-fields"></div>
    <div class="modal-actions" id="m-actions"></div>
  </div>
</div>

<div class="toast" id="toast">
  <div class="toast-dot"></div>
  <span id="toast-msg"></span>
</div>

<script>
const OAUTH_CLIENT = '961872947421-e8lr07abuul5be3ap6s7id569jqcvuah.apps.googleusercontent.com';
const SCOPE = 'https://www.googleapis.com/auth/contacts.readonly https://www.googleapis.com/auth/contacts';

let googleToken = null;
let tokenClient = null;
let allContacts = [];
let currentView = 'grid';

const $ = id => document.getElementById(id);

// ── Google Auth ──
function loadGSI() {
  return new Promise((res, rej) => {
    if (window.google?.accounts) return res();
    const s = document.createElement('script');
    s.src = 'https://accounts.google.com/gsi/client';
    s.onload = res; s.onerror = rej;
    document.head.appendChild(s);
  });
}

async function initAuth() {
  try {
    await loadGSI();
    tokenClient = google.accounts.oauth2.initTokenClient({
      client_id: OAUTH_CLIENT,
      scope: SCOPE,
      callback: async (resp) => {
        if (resp.error) {
          if (resp.error !== 'user_logged_out' && resp.error !== 'interaction_required' && resp.error !== 'access_denied') {
            toast('로그인 실패: ' + resp.error, 'error');
          }
          return;
        }
        googleToken = resp.access_token;
        const expiry = Date.now() + (resp.expires_in - 60) * 1000;
        sessionStorage.setItem('gtoken', googleToken);
        sessionStorage.setItem('gtoken_expiry', expiry);
        setConnected(true);
        await loadContacts();
      }
    });

    // 세션 내 저장된 토큰이 아직 유효하면 재사용
    const saved = sessionStorage.getItem('gtoken');
    const expiry = Number(sessionStorage.getItem('gtoken_expiry') || 0);
    if (saved && Date.now() < expiry) {
      googleToken = saved;
      setConnected(true);
      await loadContacts();
    } else {
      // 팝업 없이 조용히 재인증 시도
      tokenClient.requestAccessToken({ prompt: '' });
    }
  } catch(e) {
    console.warn('GSI load failed', e);
  }
}

function handleAuth() {
  if (googleToken) {
    googleToken = null;
    allContacts = [];
    setConnected(false);
    showState('login');
    toast('로그아웃됨', 'info');
    return;
  }
  if (!tokenClient) { toast('인증 초기화 실패', 'error'); return; }

  // GSI popup blocked detection
  const origOpen = window.open;
  let popupOpened = false;
  window.open = function(...args) {
    const w = origOpen.apply(this, args);
    if (w) popupOpened = true;
    else showPopupBlockedBanner();
    window.open = origOpen;
    return w;
  };
  setTimeout(() => { if (!popupOpened) { window.open = origOpen; showPopupBlockedBanner(); } }, 500);

  tokenClient.requestAccessToken();
}

function showPopupBlockedBanner() {
  const existing = document.getElementById('popup-banner');
  if (existing) return;
  const banner = document.createElement('div');
  banner.id = 'popup-banner';
  banner.style.cssText = `
    position:fixed; top:60px; left:50%; transform:translateX(-50%);
    background:#1e293b; border:1px solid #f87171; border-radius:10px;
    padding:14px 20px; z-index:400; display:flex; align-items:center; gap:12px;
    font-size:14px; box-shadow:0 8px 32px rgba(0,0,0,.5); max-width:420px; width:90%;
  `;
  banner.innerHTML = `
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#f87171" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0">
      <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
    </svg>
    <div style="flex:1">
      <div style="color:#f1f5f9;font-weight:600;margin-bottom:3px">팝업이 차단되었습니다</div>
      <div style="color:#64748b;font-size:12px">주소창 오른쪽 팝업 차단 아이콘을 클릭해 <strong style="color:#f1f5f9">localhost:8760 허용</strong> 후 다시 로그인하세요</div>
    </div>
    <button onclick="this.parentElement.remove()" style="background:none;border:none;color:#64748b;cursor:pointer;font-size:18px;line-height:1;padding:2px">✕</button>
  `;
  document.body.appendChild(banner);
}

function setConnected(v) {
  const pill = $('auth-pill');
  $('auth-label').textContent = v ? '로그아웃' : 'Google 로그인';
  pill.classList.toggle('connected', v);
}

// ── Load Contacts ──
async function loadContacts() {
  if (!googleToken) { toast('먼저 로그인하세요', 'error'); return; }
  showState('loading');
  $('refresh-btn').disabled = true;

  try {
    let contacts = [];
    let pageToken = '';

    do {
      const url = new URL('https://people.googleapis.com/v1/people/me/connections');
      url.searchParams.set('personFields', 'names,organizations,phoneNumbers,emailAddresses,addresses,metadata');
      url.searchParams.set('pageSize', '1000');
      if (pageToken) url.searchParams.set('pageToken', pageToken);

      const res = await fetch(url, {
        headers: { 'Authorization': `Bearer ${googleToken}` }
      });

      if (res.status === 401) {
        googleToken = null;
        setConnected(false);
        showState('login');
        toast('인증 만료 — 다시 로그인하세요', 'error');
        return;
      }

      const data = await res.json();
      contacts.push(...(data.connections || []));
      pageToken = data.nextPageToken || '';
    } while (pageToken);

    allContacts = contacts.filter(c => c.names?.length || c.organizations?.length);
    renderCards();
    toast(`${allContacts.length}개 명함 로드됨`, 'success');
  } catch(e) {
    showState('empty');
    toast('불러오기 실패: ' + e.message, 'error');
  } finally {
    $('refresh-btn').disabled = false;
  }
}

// ── Render ──
function getDisplayData(c) {
  const name    = c.names?.[0]?.displayName || '';
  const org     = c.organizations?.[0];
  const company = org?.name || '';
  const title   = org?.title || '';
  const phone   = c.phoneNumbers?.[0]?.value || '';
  const email   = c.emailAddresses?.[0]?.value || '';
  const address = c.addresses?.[0]?.formattedValue || '';
  const initial = (name || company || '?')[0].toUpperCase();
  return { name, company, title, phone, email, address, initial };
}

function renderCards() {
  const q    = $('search-input').value.toLowerCase();
  const sort = $('sort-select').value;

  let list = allContacts.filter(c => {
    if (!q) return true;
    const d = getDisplayData(c);
    return [d.name, d.company, d.phone, d.email].some(v => v.toLowerCase().includes(q));
  });

  list.sort((a, b) => {
    const da = getDisplayData(a), db = getDisplayData(b);
    if (sort === 'name')    return da.name.localeCompare(db.name, 'ko');
    if (sort === 'company') return da.company.localeCompare(db.company, 'ko');
    const ta = a.metadata?.sources?.[0]?.updateTime || '';
    const tb = b.metadata?.sources?.[0]?.updateTime || '';
    return tb.localeCompare(ta);
  });

  $('count-num').textContent = list.length;

  if (!list.length) {
    showState(allContacts.length ? 'empty' : 'empty');
    return;
  }

  showState('cards');
  const grid = $('cards-grid');
  grid.innerHTML = '';

  if (currentView === 'list') {
    grid.classList.add('list-view');
  } else {
    grid.classList.remove('list-view');
  }

  list.forEach((c, i) => {
    const d = getDisplayData(c);
    const card = document.createElement('div');
    card.className = 'card';
    card.onclick = () => openModal(c);

    if (currentView === 'grid') {
      card.innerHTML = `
        <div class="card-accent-bar"></div>
        <div class="card-avatar">${d.initial}</div>
        <div class="card-name">${esc(d.name || d.company || '—')}</div>
        ${(d.company || d.title) ? `<div class="card-org">${esc([d.title, d.company].filter(Boolean).join(' · '))}</div>` : ''}
        <div class="card-fields">
          ${d.phone   ? `<div class="card-field">${phoneIcon()}  <span>${esc(d.phone)}</span></div>` : ''}
          ${d.email   ? `<div class="card-field">${mailIcon()}   <span>${esc(d.email)}</span></div>` : ''}
          ${d.address ? `<div class="card-field">${pinIcon()}    <span>${esc(d.address)}</span></div>` : ''}
        </div>`;
    } else {
      card.innerHTML = `
        <div class="card-avatar">${d.initial}</div>
        <div class="card-body">
          <div class="card-name">${esc(d.name || d.company || '—')}</div>
          ${(d.company || d.title) ? `<div class="card-org" style="margin-bottom:6px">${esc([d.title, d.company].filter(Boolean).join(' · '))}</div>` : ''}
          <div class="card-meta">
            ${d.phone ? `<div class="card-field">${phoneIcon()} <span>${esc(d.phone)}</span></div>` : ''}
            ${d.email ? `<div class="card-field">${mailIcon()}  <span>${esc(d.email)}</span></div>`  : ''}
          </div>
        </div>`;
    }

    grid.appendChild(card);
  });
}

// ── Modal ──
function openModal(c) {
  const d = getDisplayData(c);
  $('m-avatar').textContent = d.initial;
  $('m-name').textContent = d.name || d.company || '—';
  $('m-title-org').textContent = [d.title, d.company].filter(Boolean).join(' · ');

  const fields = [];
  if (d.phone)   fields.push(modalField(phoneIcon(), '전화', `<a href="tel:${d.phone}">${esc(d.phone)}</a>`, d.phone));
  if (d.email)   fields.push(modalField(mailIcon(),  '이메일', `<a href="mailto:${d.email}">${esc(d.email)}</a>`, d.email));
  if (d.company) fields.push(modalField(buildingIcon(), '회사', esc(d.company), d.company));
  if (d.title)   fields.push(modalField(badgeIcon(),  '직함', esc(d.title), d.title));
  if (d.address) fields.push(modalField(pinIcon(),   '주소', esc(d.address), d.address));
  $('m-fields').innerHTML = fields.join('');

  const actions = [];
  if (d.phone) actions.push(`<button class="btn-action btn-call" onclick="window.location='tel:${d.phone}'">${phoneIcon()} 전화</button>`);
  if (d.email) actions.push(`<button class="btn-action btn-mail" onclick="window.location='mailto:${d.email}'">${mailIcon()} 메일</button>`);

  const allText = [
    d.name    && `이름: ${d.name}`,
    d.company && `회사: ${d.company}`,
    d.title   && `직함: ${d.title}`,
    d.phone   && `전화: ${d.phone}`,
    d.email   && `이메일: ${d.email}`,
    d.address && `주소: ${d.address}`,
  ].filter(Boolean).join('\n');
  actions.push(`<button class="btn-action btn-copy-all" id="btn-copy-all" onclick="copyAllInfo(this, \`${allText.replace(/`/g,'\\`')}\`)">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
    </svg>
    전체 복사
  </button>`);

  $('m-actions').innerHTML = actions.join('');

  $('overlay').classList.add('open');
}

function closeModal(e) {
  if (e && e.target !== $('overlay')) return;
  $('overlay').classList.remove('open');
}

function modalField(icon, label, value, copyText) {
  const copyBtn = copyText ? `
    <button class="copy-btn" onclick="copyToClipboard('${copyText.replace(/'/g,"\\'")}', this)" title="복사">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
      </svg>
    </button>` : '';
  return `<div class="modal-field-row">
    <div class="modal-field-icon">${icon}</div>
    <div style="flex:1;min-width:0">
      <div class="modal-field-label">${label}</div>
      <div class="modal-field-value" style="display:flex;align-items:center;gap:8px">
        <span style="flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${value}</span>
        ${copyBtn}
      </div>
    </div>
  </div>`;
}

async function copyAllInfo(btn, text) {
  try {
    await navigator.clipboard.writeText(text);
    btn.classList.add('copied');
    const orig = btn.innerHTML;
    btn.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg> 복사됨`;
    setTimeout(() => { btn.innerHTML = orig; btn.classList.remove('copied'); }, 1800);
  } catch(e) {
    toast('복사 실패', 'error');
  }
}

async function copyToClipboard(text, btn) {
  try {
    await navigator.clipboard.writeText(text);
    const orig = btn.innerHTML;
    btn.innerHTML = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="var(--success)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`;
    btn.style.borderColor = 'var(--success)';
    setTimeout(() => { btn.innerHTML = orig; btn.style.borderColor = ''; }, 1500);
  } catch(e) {
    toast('복사 실패', 'error');
  }
}

// ── State helpers ──
function showState(s) {
  $('state-login').style.display   = s === 'login'   ? 'flex' : 'none';
  $('state-loading').style.display = s === 'loading' ? 'flex' : 'none';
  $('state-empty').style.display   = s === 'empty'   ? 'flex' : 'none';
  $('cards-grid').style.display    = s === 'cards'   ? 'grid' : 'none';
}

function setView(v) {
  currentView = v;
  $('btn-grid').classList.toggle('active', v === 'grid');
  $('btn-list').classList.toggle('active', v === 'list');
  if (allContacts.length) renderCards();
}

// ── Icons ──
const icon = (d) => `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${d}</svg>`;
const phoneIcon    = () => icon('<path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.58 3.5 2 2 0 0 1 3.55 1.31h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.82a16 16 0 0 0 6.29 6.29l1.88-1.88a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/>');
const mailIcon     = () => icon('<path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/>');
const pinIcon      = () => icon('<path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/>');
const buildingIcon = () => icon('<path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9,22 9,12 15,12 15,22"/>');
const badgeIcon    = () => icon('<rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/>');

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Toast ──
let toastTimer;
function toast(msg, type = 'info') {
  const el = $('toast');
  el.className = `toast ${type}`;
  $('toast-msg').textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 3000);
}

// ── Search ──
$('search-input').addEventListener('input', renderCards);

// ── Keyboard ──
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') $('overlay').classList.remove('open');
});

// ── Init ──
initAuth();
</script>
</body>
</html>
